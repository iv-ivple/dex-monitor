services:
  - type: web
    name: dex-monitor
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: RPC_URL
        sync: false
      - key: REDIS_URL
        sync: false

  - type: redis
    name: dex-monitor-redis
    plan: free
    ipAllowList: []
